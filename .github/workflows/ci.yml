name: CI

# Required repository secrets (Settings → Secrets and variables → Actions):
#   JWT_SECRET, SMTP_HOST, SMTP_USER, SMTP_PASS
#   NOMBA_WEBHOOK_SECRET, NOMBA_SUB_ACCOUNT_ID
#   NOMBA_API_BASE_URL, NOMBA_PARENT_ACCOUNT_ID, NOMBA_CLIENT_ID, NOMBA_CLIENT_SECRET
#   SENTRY_DSN (optional)
#   NEXT_PUBLIC_API_BASE_URL (optional — direct API URL for local/CI builds)
#   API_PROXY_TARGET (optional — Vercel server-side proxy to the Express API)
#
# Optional (Nomba sandbox job on main): NOMBA_SANDBOX_VA_IDENTIFIERS
#
# NOT used in CI (on purpose):
#   DATABASE_URL, REDIS_URL — integration uses ephemeral Postgres/Redis service
#   containers on the runner (localhost). Do not point CI at Aiven/staging DBs.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  AUTH_REQUIRE_EMAIL_VERIFICATION: "false"
  JWT_SECRET: ${{ secrets.JWT_SECRET }}
  SMTP_HOST: ${{ secrets.SMTP_HOST }}
  SMTP_PORT: ${{ secrets.SMTP_PORT }}
  SMTP_SECURE: ${{ secrets.SMTP_SECURE }}
  SMTP_USER: ${{ secrets.SMTP_USER }}
  SMTP_PASS: ${{ secrets.SMTP_PASS }}
  FRONTEND_URL: ${{ secrets.FRONTEND_URL }}
  NOMBA_API_BASE_URL: ${{ secrets.NOMBA_API_BASE_URL }}
  NOMBA_PARENT_ACCOUNT_ID: ${{ secrets.NOMBA_PARENT_ACCOUNT_ID }}
  NOMBA_SUB_ACCOUNT_ID: ${{ secrets.NOMBA_SUB_ACCOUNT_ID }}
  NOMBA_CLIENT_ID: ${{ secrets.NOMBA_CLIENT_ID }}
  NOMBA_CLIENT_SECRET: ${{ secrets.NOMBA_CLIENT_SECRET }}
  NOMBA_WEBHOOK_SECRET: ${{ secrets.NOMBA_WEBHOOK_SECRET }}
  SENTRY_DSN: ${{ secrets.SENTRY_DSN }}

jobs:
  server:
    name: Server — unit tests & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    env:
      # Unit tests mock the DB/Redis — placeholders satisfy env.ts at import time.
      DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
      REDIS_URL: redis://localhost:6379
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm test
        env:
          NODE_ENV: test

      - name: Build
        run: npm run build

  integration:
    name: Server — integration (Postgres + Redis)
    runs-on: ubuntu-latest
    needs: server
    defaults:
      run:
        working-directory: server
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
          POSTGRES_DB: ledger_core
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U user -d ledger_core"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      NODE_ENV: test
      # Service containers on the runner — overrides repo DATABASE_URL/REDIS_URL secrets.
      DATABASE_URL: postgresql://user:password@localhost:5432/ledger_core
      REDIS_URL: redis://localhost:6379
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run migrations
        run: npm run migrate

      - name: Integration tests
        run: npm run test:integration

  nomba-sandbox:
    name: Nomba sandbox smoke (optional)
    runs-on: ubuntu-latest
    needs: server
    continue-on-error: true
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    defaults:
      run:
        working-directory: server
    env:
      NOMBA_SANDBOX_VA_IDENTIFIERS: ${{ secrets.NOMBA_SANDBOX_VA_IDENTIFIERS }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Nomba sandbox smoke test
        run: npm run test:nomba-sandbox

  frontend:
    name: Frontend — lint & build
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_API_BASE_URL: ${{ secrets.NEXT_PUBLIC_API_BASE_URL }}
      NEXT_PUBLIC_SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
