services:
  postgres:
    image: postgres:16-alpine
    container_name: ledger-core-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: ledger_core
    ports:
      - "5432:5432"
    volumes:
      - ledger_core_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d ledger_core"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ledger-core-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - ledger_core_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  ledger_core_postgres_data:
  ledger_core_redis_data:
